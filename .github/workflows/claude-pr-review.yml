name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Safety filter — prevents infinite loop:
    # Runs on pull_request events always.
    # Runs on issue_comment ONLY when:
    #   - Comment is on a PR (not a regular issue)
    #   - Comment contains @claude
    #   - Comment author is NOT a bot
    if: |
      github.event_name == 'pull_request' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        github.actor != 'claude[bot]' &&
        github.actor != 'github-actions[bot]' &&
        contains(github.event.comment.body, '@claude')
      )

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # model: claude-haiku-4-5-20251001
          direct_prompt: |
            You are a senior code reviewer. Review this PR and output findings as a JSON array ONLY.
            No narrative text — only the JSON array.

            ONLY report findings in these categories (Q2 — Focus on What Matters):
            1. Security vulnerabilities (hardcoded credentials, exposed secrets, passwords)
            2. Access control issues (bypassed auth, wrong requester IDs)
            3. Missing form validations (required fields, input checks)
            4. Logic bugs that break functionality

            DO NOT report:
            - Code style or formatting preferences
            - Variable or function naming suggestions
            - Comment or documentation quality
            - Code organization opinions

            For each finding output this exact JSON structure (Q12 — Inline PR Comments + Q13 — Visible Reasoning):
            [
              {
                "file": "relative/path/to/file.tsx",
                "line": 42,
                "severity": "critical",
                "issue": "Short description of the problem",
                "reasoning": "One sentence explaining why this is a real issue not a false positive",
                "fix": "Specific actionable suggestion on exactly what to change"
              }
            ]

            Severity levels:
            - "critical" → security vulnerability or data exposure
            - "high"     → access control bypass or broken auth
            - "medium"   → missing validation or logic bug
            - "low"      → minor correctness issue

            If no issues found, output: []

            If triggered by a comment containing "@claude implement" or "@claude fix",
            apply the recommended fixes directly to the codebase and commit the changes
            to the PR branch automatically.

      - name: Deduplicate findings (Q5 — No Repeat Findings)
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -f claude-findings.json ]; then
            node .github/scripts/deduplicate-findings.js
          else
            echo "[]" > deduplicated-findings.json
          fi
