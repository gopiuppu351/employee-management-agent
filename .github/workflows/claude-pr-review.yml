name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

concurrency:
  group: claude-review-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Prevent infinite loops: only run for human actors.
    # For comments: only on PRs, and only when @claude is mentioned.
    if: |
      (
        github.event_name == 'pull_request' &&
        github.actor != 'claude' &&
        github.actor != 'github-actions' &&
        !endsWith(github.actor, '[bot]')
      ) ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        github.actor != 'claude' &&
        github.actor != 'github-actions' &&
        !endsWith(github.actor, '[bot]') &&
        contains(github.event.comment.body, '@claude')
      )

    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          use_sticky_comment: true
          claude_args: |
            --model claude-haiku-4-5-20251001
            --max-turns 15
          prompt: |
            You are a senior code reviewer. Review this PR and report only real,
            actionable findings in these categories:

            1. Security: hardcoded credentials, exposed secrets, XSS/CSRF risks,
               sensitive data logged or rendered without validation
            2. Access control: missing auth/role checks, endpoints or data
               accessible without authorization
            3. Validation: required fields missing, unsanitized user input,
               missing error/loading states, no failure feedback on submissions
            4. Logic bugs: incorrect conditionals, missing error handling in
               async code, state management bugs
            5. Type safety: use of "any", missing return types, untyped props,
               type assertions instead of proper typing
            6. Code quality: functions over 50 lines, duplicate logic, dead code,
               deeply nested conditionals, magic numbers, inconsistent
               error-handling patterns
            7. Edge cases: missing null/undefined checks, no empty-array guards,
               unchecked API response fields, timezone-naive date comparisons

            Do NOT report: style/formatting preferences, naming suggestions,
            comment quality, or minor refactors with no functional impact.

            For each finding, give: file, line, severity (critical/high/medium/low),
            a one-line issue description, and a specific fix suggestion.
            Post your review as inline comments where possible, with a summary
            comment. If there are no issues, say so briefly.
      - name: Create GitHub Issues (Req 2 — Track Findings as Issues)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          PR_URL: ${{ github.event.pull_request.html_url || github.event.issue.html_url }}
        run: |
          echo "Waiting 10s for Claude to finish posting PR comment..."
          sleep 10
          node .github/scripts/create-issues.js

      - name: Post usage and cost to PR
        if: always() && steps.claude.outputs.execution_file != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: |
          FILE="${{ steps.claude.outputs.execution_file }}"

          RESULT=$(jq '[.[] | select(.type=="result")] | last' "$FILE")
          if [ "$RESULT" = "null" ] || [ -z "$RESULT" ]; then
            echo "No result entry found in execution file, skipping."
            exit 0
          fi

          INPUT=$(echo "$RESULT"        | jq -r '.usage.input_tokens // 0')
          OUTPUT=$(echo "$RESULT"       | jq -r '.usage.output_tokens // 0')
          CACHE_READ=$(echo "$RESULT"   | jq -r '.usage.cache_read_input_tokens // 0')
          CACHE_WRITE=$(echo "$RESULT"  | jq -r '.usage.cache_creation_input_tokens // 0')
          COST=$(echo "$RESULT"         | jq -r '.total_cost_usd // 0')
          DURATION=$(echo "$RESULT"     | jq -r '.duration_ms // 0')
          TURNS=$(echo "$RESULT"        | jq -r '.num_turns // 0')

          BODY=$(cat <<EOF
          ### 🤖 Claude Review — Usage & Cost
          | Metric | Value |
          |---|---|
          | Model | claude-haiku-4-5 |
          | Input tokens | $INPUT |
          | Output tokens | $OUTPUT |
          | Cache read tokens | $CACHE_READ |
          | Cache write tokens | $CACHE_WRITE |
          | Turns | $TURNS |
          | Duration | $((DURATION / 1000))s |
          | **Cost** | **\$$COST** |
          EOF
          )

          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$BODY"

          # Also show in the Actions run summary (free monitoring across runs)
          echo "$BODY" >> "$GITHUB_STEP_SUMMARY"
