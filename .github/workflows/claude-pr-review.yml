name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            You are a senior code reviewer. Review this PR thoroughly and report:
            1. Any security vulnerabilities (hardcoded credentials, exposed secrets, passwords)
            2. Any access control issues (bypassed auth, wrong requester IDs)
            3. Any missing form validations (required fields, input checks)
            4. Any bugs or bad practices

            Be specific — mention the exact file name and line where each issue is found.
            Post a detailed review comment on this PR.
