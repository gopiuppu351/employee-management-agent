name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

concurrency:
  group: claude-review-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Safety filter — prevents infinite loop:
    # Runs on pull_request ONLY when pushed by a human (not Claude bot commits)
    # Runs on issue_comment ONLY when:
    #   - Comment is on a PR (not a regular issue)
    #   - Comment contains @claude
    #   - Comment author is NOT a bot
    if: |
      (
        github.event_name == 'pull_request' &&
        github.actor != 'claude' &&
        github.actor != 'github-actions' &&
        !endsWith(github.actor, '[bot]')
      ) ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        github.actor != 'claude' &&
        github.actor != 'github-actions' &&
        !endsWith(github.actor, '[bot]') &&
        contains(github.event.comment.body, '@claude')
      )

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: claude-haiku-4-5-20251001
          direct_prompt: |
            You are a senior code reviewer. Review this PR and output findings as a JSON array ONLY.
            No narrative text — only the JSON array.

            ── EXISTING CATEGORIES (always check) ──────────────────────────────
            1. Security vulnerabilities
               - Hardcoded credentials, exposed secrets, passwords in code
               - Environment variables missing for sensitive values
               - Data exposure risks visible to unauthorized users

            2. Access control issues
               - Bypassed authentication, wrong requester IDs
               - Missing role checks before sensitive operations
               - Endpoints or data accessible without proper authorization

            3. Missing form validations
               - Required fields without required attribute
               - No input length limits or format checks
               - User input passed to API without sanitization

            4. Logic bugs that break functionality
               - Incorrect conditional logic or wrong comparisons
               - Missing error handling in async operations
               - State management issues causing incorrect UI behavior

            ── NEW CATEGORIES (Requirement 1 — Extended CI Coverage) ──────────
            5. Code quality and maintainability
               - Functions longer than 50 lines doing too many things
               - Duplicate logic that should be extracted into a shared utility
               - Dead code — variables declared but never used, unreachable blocks
               - Deeply nested conditionals (more than 3 levels) that reduce readability

            6. Static type checking
               - Use of "any" type that bypasses TypeScript safety
               - Missing return types on functions that return values
               - Props passed without proper TypeScript interface definitions
               - Type assertions (as SomeType) used instead of proper typing

            7. Integration test validation
               - New API calls added with no corresponding error handling for failure cases
               - Missing loading and error states for async data fetching
               - Form submissions with no success or failure feedback to the user
               - Component side effects with no cleanup (missing useEffect return)

            8. Security best practices and vulnerability checks
               - XSS risks — user input rendered without sanitization
               - CSRF risks — state-changing operations without protection
               - Sensitive data logged to console (console.log with passwords, tokens, IDs)
               - API responses rendered directly without validation

            9. Coding standards enforcement
               - Inconsistent error handling patterns (some try/catch, some .catch, some none)
               - Mixed async patterns (callbacks mixed with async/await in same codebase)
               - Constants defined inline instead of as named constants
               - Magic numbers or strings used directly instead of named values

            10. Edge case handling
                - No null/undefined checks before accessing object properties
                - Array operations with no empty array guard
                - Date comparisons with no timezone consideration
                - API response fields accessed without checking if they exist

            ── DO NOT REPORT ────────────────────────────────────────────────────
            - Code style or formatting preferences
            - Variable or function naming suggestions
            - Comment or documentation quality
            - Code organization opinions
            - Minor refactoring suggestions with no functional impact

            ── OUTPUT FORMAT ────────────────────────────────────────────────────
            For each finding output this exact JSON structure:
            [
              {
                "file": "relative/path/to/file.tsx",
                "line": 42,
                "category": "code-quality",
                "severity": "critical",
                "issue": "Short description of the problem",
                "reasoning": "One sentence explaining why this is a real issue not a false positive",
                "fix": "Specific actionable suggestion on exactly what to change"
              }
            ]

            Category values:
            - "security"         → categories 1 and 8
            - "access-control"   → category 2
            - "validation"       → categories 3 and 7
            - "logic-bug"        → category 4
            - "code-quality"     → categories 5 and 9
            - "type-safety"      → category 6
            - "edge-case"        → category 10

            Severity levels:
            - "critical" → security vulnerability or data exposure
            - "high"     → access control bypass, broken auth, XSS/CSRF risk
            - "medium"   → missing validation, logic bug, type safety issue
            - "low"      → code quality, edge case, standards violation

            If no issues found, output: []

            If triggered by a comment containing "@claude implement" or "@claude fix",
            apply the recommended fixes directly to the codebase and commit the changes
            to the PR branch automatically.

      - name: Deduplicate findings (Q5 — No Repeat Findings)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: |
          if [ -f claude-findings.json ]; then
            node .github/scripts/deduplicate-findings.js
          else
            echo "[]" > deduplicated-findings.json
          fi
      - name: Re-checkout main for scripts
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          clean: false

      - name: Create GitHub Issues (Req 2 — Track Findings as Issues)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          PR_URL: ${{ github.event.pull_request.html_url || github.event.issue.html_url }}
        run: |
          echo "Waiting 10s for Claude to finish posting PR comment..."
          sleep 10
          node .github/scripts/create-issues.js
